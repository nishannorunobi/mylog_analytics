#!/bin/bash
# project.conf — Docker config for the mylog_analytics project.
# Sourced by start.sh, stop.sh, run_in_host.sh, and loginto_docker.sh.

PROJECT_NAME="mylog_analytics"
IMAGE_NAME="mylog_analytics-image"
IMAGE_VERSION="1.0"
CONTAINER_NAME="mylog_analytics-container"
CONTAINER_WORKDIR="/mylog_analytics"

REMOVE_IMAGE_ON_STOP=false
FORCE_RECREATE_CONTAINER=false

# ─── Port forwarding (run_in_host.sh) ─────────────────────────────────────────
EXPOSE_PORTS="8893:8893 3000:3000 3100:3100"
